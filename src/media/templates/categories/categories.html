{% extends "core/layout.html" %}
{% load static %}
{% block title %}Porn Categories{% endblock %}
{% block extra_head %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ request.scheme }}://{{ request.get_host }}"
    },
    {
      "@type": "ListItem",
      "position": 2,
      "name": "Categories",
      "item": "{{ request.scheme }}://{{ request.get_host }}{{ request.path }}"
    }
  ]
}
</script>
{% endblock %}

{% block content %}
    <section class="section-padding">
        <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between mb-4">
                <h1 class="main-title text-capitalize mb-0">Genres</h1>
            </div>
            <div class="genres-grid gy-4 row row-cols-2 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5">
                {% for category in categories %}
                    <div class="col">
                        <div class="iq-card-geners position-relative card-hover-style-two">
                            <div class="img-box position-relative">
                                <a href="{{ category.category_search_url }}">
                                    <img src="{{ category.image }}" alt="{{ category.title }}" class="img-fluid" loading="lazy">
                                    <h6 class="blog-description">{{ category.title }}</h6>
                                </a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </section>
{% endblock %}
