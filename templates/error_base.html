<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock title %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-950 flex items-center justify-center px-4 text-white">

<div class="max-w-md w-full text-center bg-gray-900 rounded-2xl shadow-2xl p-8 border border-gray-800">

    <!-- Error code -->
    <div class="text-7xl font-extrabold text-gray-700 mb-4 tracking-tight">
        {% block code %}{% endblock code %}
    </div>

    <!-- Heading -->
    <h1 class="text-2xl font-bold text-white mb-2">
        {% block heading %}{% endblock heading %}
    </h1>

    <!-- Message -->
    <p class="text-gray-400 mb-6 leading-relaxed">
        {% block message %}{% endblock message %}
    </p>

    <!-- Button -->
    <a href="/"
       class="inline-block rounded-lg bg-indigo-600 px-5 py-2.5 text-white font-semibold
              hover:bg-indigo-500 active:bg-indigo-700 transition shadow-md">
        Go back home
    </a>

</div>

</body>
</html>
