{% load static %}
<div id="installPrompt"
     class="position-fixed bottom-0 start-0 w-100 p-3"
     style="display:none; z-index: 9999;">

    <div class="card bg-dark text-white border-secondary shadow-lg mx-auto" style="max-width: 500px;">
        <div class="card-body d-flex justify-content-between align-items-center">

            <div>
                <strong>Install app</strong><br>
                <small>Get full-screen experience</small>
            </div>

            <div class="ms-3">
                <button id="installBtn" class="btn btn-light btn-sm me-2">Install</button>
                <button id="closeBtn" class="btn btn-outline-light btn-sm">✕</button>
            </div>

        </div>
    </div>

</div>

<div id="iosInstallPrompt" class="position-fixed bottom-0 start-0 w-100 p-3" style="display:none; z-index:9999;">
    <div class="card bg-dark text-white border-secondary shadow mx-auto" style="max-width:500px;">
        <div class="card-body">
            <strong>Install App</strong><br>
            <small>Tap <b>Share</b> → <b>Add to Home Screen</b> in Safari</small>

            <button id="iosClose" class="btn btn-outline-light btn-sm mt-2 float-end">Got it</button>
        </div>
    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{% static 'js/core/service-worker.js' %}')
            .then(function (reg) {
                console.log("Service worker registered.", reg);
            })
            .catch(function (err) {
                console.error("Service worker FAILED:", err);
            });
    }
</script>
