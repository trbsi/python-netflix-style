{% load static %}
<div id="installPrompt"
     class="position-fixed bottom-0 start-0 w-100 p-3"
     style="display:none; z-index: 9999;">

    <div class="card bg-dark text-white border-secondary shadow-lg mx-auto" style="max-width: 500px;">
        <div class="card-body d-flex justify-content-between align-items-center">

            <div>
                <strong>Install app</strong><br>
                <small>Get full-screen experience</small>
            </div>

            <div class="ms-3">
                <button id="installBtn" class="btn btn-light btn-sm me-2">Install</button>
                <button id="closeBtn" class="btn btn-outline-light btn-sm">✕</button>
            </div>

        </div>
    </div>

</div>

<div id="iosInstallPrompt"
     class="position-fixed bottom-0 start-0 w-100 justify-content-center"
     style="display:none; z-index:9999; padding-bottom: env(safe-area-inset-bottom);">

    <div class="bg-dark text-white rounded-4 shadow-lg p-3 mb-3 position-relative"
         style="max-width: 360px; width: 95%;">

        <!-- Arrow -->
        <div class="ios-arrow"></div>

        <div class="d-flex justify-content-between align-items-start">
            <div>
                <div class="fw-semibold">Install App</div>
                <small class="text-white">
                    Tap <strong>Share</strong> then <strong>Add to Home Screen</strong>
                </small>
            </div>

            <button id="iosClose" class="btn btn-sm btn-outline-light ms-2">✕</button>
        </div>

    </div>
</div>

<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('{% static 'js/core/service-worker.js' %}')
            .then(function (reg) {
                console.log("Service worker registered.", reg);
            })
            .catch(function (err) {
                console.error("Service worker FAILED:", err);
            });
    }
</script>
<script src="{% static 'js/core/pwa.js' %}"></script>
