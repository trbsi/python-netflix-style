<div class="pagination justify-content-center mt-4 d-flex flex-column align-items-center">

    <!-- Showing results (ROW 1) -->
    <div class="text-center mb-3">
        <small class="text-muted">
            Showing
            <span class="fw-semibold text-light">{{ page_obj.start_index }}</span>
            to
            <span class="fw-semibold text-light">{{ page_obj.end_index }}</span>
            of
            <span class="fw-semibold text-light">{{ page_obj.paginator.count }}</span>
            results
        </small>
    </div>

    <!-- Pagination (ROW 2) -->
    <ul class="pagination blog-pagination gap-2 mb-0" id="pagination">

        <!-- Previous button -->
        {% if page_obj.has_previous %}
            <li class="page-item">
                <a class="page-link rounded-3"
                   href="?page={{ page_obj.previous_page_number }}">
                    <i class="ph ph-caret-left pageicon-lineheight"></i>
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link rounded-3">
                    <i class="ph ph-caret-left pageicon-lineheight"></i>
                </span>
            </li>
        {% endif %}

        <!-- Input -->
        <li class="page-item">
            <div class="d-flex align-items-center gap-2 px-2">

                <input type="number"
                       id="pageInput"
                       value="{{ page_obj.number }}"
                       min="1"
                       max="{{ page_obj.paginator.num_pages }}"
                       class="form-control form-control-sm text-center"
                       style="width: 70px;">

                <span class="text-muted small">
                    / {{ page_obj.paginator.num_pages }}
                </span>

            </div>
        </li>

        <!-- Next button -->
        {% if page_obj.has_next %}
            <li class="page-item">
                <a class="page-link rounded-3"
                   href="?page={{ page_obj.next_page_number }}">
                    <i class="ph ph-caret-right pageicon-lineheight"></i>
                </a>
            </li>
        {% else %}
            <li class="page-item disabled">
                <span class="page-link rounded-3">
                    <i class="ph ph-caret-right pageicon-lineheight"></i>
                </span>
            </li>
        {% endif %}

    </ul>

</div>
